<style>
:root {
    --background:#070b14;
    --surface:#111827;
    --surface-light:#172033;
    --border:#26334c;
    --primary:#2563eb;
    --primary-hover:#1d4ed8;
    --accent:#38bdf8;
    --text:#f8fafc;
    --muted:#cbd5e1;
    --success:#22c55e;

*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:var(--background);
    color:var(--text);
    line-height:1.65
}
a{color:inherit}
.container{width:min(92%,var(--max-width));margin:0 auto}
.site-header{
    position:sticky;top:0;z-index:1000;
    background:rgba(7,11,20,.97);
    border-bottom:1px solid var(--border)
}
.nav{
    min-height:70px;display:flex;justify-content:space-between;
    align-items:center;gap:24px
}
.brand{font-size:1.3rem;font-weight:700;text-decoration:none}
.brand span{color:var(--accent)}
.nav-links{display:flex;gap:18px;flex-wrap:wrap}
.nav-links a{color:var(--muted);text-decoration:none;font-size:.95rem}
.nav-links a:hover{color:var(--text)}
.hero{
    padding:85px 0 65px;
    background:

      radial-gradient(circle at left,rgba(56,189,248,.12),transparent 32%)
}
.eyebrow{
    display:inline-block;padding:6px 12px;border-radius:999px;
    border:1px solid rgba(56,189,248,.4);
    color:var(--accent);background:rgba(56,189,248,.08);
    font-size:.82rem;font-weight:700;text-transform:uppercase;
    letter-spacing:.05em
}
h1{font-size:clamp(2.6rem,7vw,5rem);line-height:1.05;margin:18px 0}
h2{font-size:clamp(1.8rem,4vw,2.7rem)}
.lead{max-width:800px;color:var(--muted);font-size:1.1rem}
.section{padding:70px 0}
.section-alt{background:#0b1220}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.card{
    background:var(--surface);border:1px solid var(--border);
    border-radius:16px;padding:25px
}
.card h3{margin-top:0}
.card p,.muted{color:var(--muted)}
.button-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:24px}
.button{
    display:inline-flex;align-items:center;justify-content:center;
    min-height:46px;padding:11px 20px;border-radius:10px;
    font-weight:700;text-decoration:none
}
.button-primary{background:var(--primary);color:#fff}
.button-primary:hover{background:var(--primary-hover)}
.button-secondary{background:var(--surface);border:1px solid var(--border)}
.button-secondary:hover{border-color:var(--accent)}
.badge{
    display:inline-block;border-radius:999px;padding:5px 10px;
    font-size:.8rem;font-weight:700
}
.available{background:rgba(34,197,94,.12);color:#86efac}
.coming{background:rgba(245,158,11,.12);color:#fcd34d}
.list{padding-left:20px}
.list li{margin-bottom:10px;color:var(--muted)}
.notice{
    border-left:4px solid var(--accent);
    background:var(--surface);padding:18px 20px;border-radius:0 12px 12px 0
}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;background:var(--surface)}
th,td{border:1px solid var(--border);padding:14px;text-align:left}
th{background:var(--surface-light)}
details{
    border-bottom:1px solid var(--border);
    padding:18px 0
}
summary{font-weight:700;cursor:pointer}
details p{color:var(--muted)}
.footer{border-top:1px solid var(--border);padding:30px 0;color:var(--muted)}
.footer-content{display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap}
.footer a{color:var(--accent);text-decoration:none}
.form-card{
    max-width:760px;background:var(--surface);border:1px solid var(--border);
    border-radius:16px;padding:26px
}
label{display:block;margin:16px 0 7px;font-weight:700}
input,textarea,select{
    width:100%;padding:12px 13px;border-radius:9px;
    border:1px solid var(--border);background:#0b1220;color:var(--text)
}
textarea{min-height:150px;resize:vertical}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:650px){
    .nav{padding:15px 0;flex-direction:column;align-items:flex-start}
    .grid{grid-template-columns:1fr}
    .button{width:100%}
}
</style>
